version: '3.9'
services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ghaya
      POSTGRES_PASSWORD: ghaya
      POSTGRES_DB: ghaya
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
  web:
    build: .
    depends_on:
      - db
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://ghaya:ghaya@db:5432/ghaya?schema=public
      NEXTAUTH_SECRET: changeme
      SITE_URL: http://localhost:3000
volumes:
  db-data:
